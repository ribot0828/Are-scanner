<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Are Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Sans+JP:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'Inter', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
  }
  .container { max-width: 1100px; margin: 0 auto; padding: 20px 16px; }

  header { text-align: center; margin-bottom: 24px; }
  h1 { font-size: 1.8rem; color: #f97316; letter-spacing: 0.05em; }
  .tagline { color: #64748b; font-size: 0.85rem; margin-top: 4px; }

  .mode-tabs {
    display: flex; justify-content: center; gap: 4px; margin-bottom: 16px;
  }
  .mode-tab {
    padding: 8px 20px; border-radius: 8px; border: 1px solid #334155;
    background: #1e293b; color: #94a3b8; font-size: 0.85rem;
    cursor: pointer; font-weight: 600;
  }
  .mode-tab.active { background: #f97316; color: #fff; border-color: #f97316; }

  .input-area {
    display: flex; gap: 8px; margin-bottom: 16px;
    max-width: 700px; margin-left: auto; margin-right: auto;
  }
  .input-area input {
    flex: 1; padding: 10px 14px; border-radius: 8px;
    border: 1px solid #334155; background: #1e293b; color: #e2e8f0;
    font-size: 0.95rem; outline: none;
  }
  .input-area input::placeholder { color: #475569; }
  .input-area input:focus { border-color: #f97316; }
  .input-area button {
    padding: 10px 24px; border-radius: 8px; border: none;
    background: #f97316; color: #fff; font-weight: 700;
    font-size: 0.95rem; cursor: pointer; white-space: nowrap;
  }
  .input-area button:hover { background: #ea580c; }
  .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }

  .filters {
    display: flex; gap: 16px; align-items: center; flex-wrap: wrap;
    max-width: 700px; margin: 0 auto 16px;
    font-size: 0.85rem; color: #94a3b8;
  }
  .filters label { display: flex; align-items: center; gap: 4px; }
  .filters input[type="number"] {
    width: 70px; padding: 4px 8px; border-radius: 6px;
    border: 1px solid #334155; background: #1e293b; color: #e2e8f0;
    font-size: 0.85rem; text-align: right;
  }

  .progress-area { text-align: center; margin-bottom: 16px; }
  .progress-bar-wrap {
    width: 100%; max-width: 500px; margin: 8px auto;
    background: #1e293b; border-radius: 6px; height: 8px; overflow: hidden;
  }
  .progress-bar {
    height: 100%; background: #f97316; border-radius: 6px;
    transition: width 0.3s;
  }
  .progress-text { font-size: 0.85rem; color: #94a3b8; }

  .summary {
    text-align: center; margin-bottom: 16px;
    font-size: 0.95rem; color: #94a3b8;
  }
  .summary .count { color: #38bdf8; font-weight: 700; font-size: 1.2rem; }

  table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
  th {
    background: #1e293b; color: #94a3b8; padding: 10px 8px;
    text-align: left; border-bottom: 2px solid #334155;
    position: sticky; top: 0; z-index: 1;
  }
  td { padding: 10px 8px; border-bottom: 1px solid #1e293b; vertical-align: top; }
  tr:hover { background: #1e293b; }
  .venue { color: #38bdf8; font-weight: 700; white-space: nowrap; }
  .meta { color: #64748b; font-size: 0.8rem; }
  .umaban { text-align: center; font-weight: 700; }
  .name { font-weight: 700; white-space: nowrap; }
  .odds { color: #f97316; font-weight: 700; text-align: right; white-space: nowrap; }
  .best { color: #4ade80; font-weight: 700; text-align: center; }
  .past-race { font-size: 0.8rem; color: #94a3b8; margin: 2px 0; }
  .margin { color: #4ade80; }
  .dist-ext { color: #a78bfa; font-weight: 700; }
  .corner-back { color: #fb923c; }
  .empty { text-align: center; padding: 40px; color: #64748b; font-size: 1.1rem; }
  .hidden { display: none; }

  @media (max-width: 640px) {
    .input-area { flex-direction: column; }
    table { font-size: 0.75rem; }
    td, th { padding: 6px 4px; }
    .filters { flex-direction: column; align-items: flex-start; }
  }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Are Scanner</h1>
    <div class="tagline" id="tagline">穴馬一括スキャン</div>
  </header>

  <div class="mode-tabs">
    <div class="mode-tab active" data-mode="anauma" onclick="setMode('anauma')">穴馬スキャン</div>
    <div class="mode-tab" data-mode="dist" onclick="setMode('dist')">距離延長スキャン</div>
  </div>

  <div class="input-area">
    <input type="text" id="urlInput" placeholder="JRAレースURLを貼り付け（PC版・スマホ版どちらでもOK）">
    <button id="scanBtn" onclick="startScan()">スキャン</button>
  </div>

  <div id="filtersAnauma" class="filters">
    <label>最低オッズ:
      <input type="number" id="minOdds" value="100" min="1" step="10">倍
    </label>
    <label>最大着差:
      <input type="number" id="maxMargin" value="1.0" min="0.1" step="0.1">秒
    </label>
  </div>

  <div id="filtersDist" class="filters hidden">
    <label>後方判定:
      後ろから<input type="number" id="backCount" value="3" min="1" max="6" step="1">頭以内
    </label>
  </div>

  <div id="progressArea" class="progress-area hidden">
    <div class="progress-bar-wrap"><div class="progress-bar" id="progressBar" style="width:0%"></div></div>
    <div class="progress-text" id="progressText">準備中...</div>
  </div>

  <div id="summary" class="summary hidden"></div>

  <table id="resultTable" class="hidden">
    <thead id="resultHead"></thead>
    <tbody id="resultBody"></tbody>
  </table>
</div>

<script>
let scanning = false;
let lastScanTime = 0;
let currentMode = 'anauma';
const COOLDOWN_MS = 3 * 60 * 1000;
const BATCH_DELAY_MS = 2000;

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  document.getElementById('filtersAnauma').classList.toggle('hidden', mode !== 'anauma');
  document.getElementById('filtersDist').classList.toggle('hidden', mode !== 'dist');
  const tagline = document.getElementById('tagline');
  if (mode === 'anauma') {
    tagline.textContent = '穴馬一括スキャン — オッズ100倍超 × 同クラス近走1.0秒以内';
  } else {
    tagline.textContent = '距離延長スキャン — ダート距離延長 × 後方待機 × 上がり上位';
  }
}

function filterAnauma(races) {
  const minOdds = parseFloat(document.getElementById('minOdds').value) || 100;
  const maxMargin = parseFloat(document.getElementById('maxMargin').value) || 1.0;
  const results = [];
  for (const race of races) {
    for (const h of race.horses) {
      if (h.odds < minOdds) continue;
      if ((h.bestMargin || 999) > maxMargin) continue;
      results.push({ ...h, venue: race.venue, raceNum: race.raceNum, raceName: race.raceName, grade: race.grade, course: race.course });
    }
  }
  return results;
}

function filterDistExtension(races) {
  const backCount = parseInt(document.getElementById('backCount').value) || 3;
  const results = [];
  for (const race of races) {
    if (race.surface !== 'ダ') continue;
    const curDist = race.distance || 0;
    if (!curDist) continue;

    for (const h of race.horses) {
      if (!h.pastRaces || h.pastRaces.length === 0) continue;

      const qualifying = [];
      for (const pr of h.pastRaces) {
        if (!pr.isJRA) continue;
        if (pr.surface !== 'ダ') continue;
        if (pr.dist >= curDist) continue;
        if (pr.f3 <= 0) continue;
        if (!pr.fieldSize || !pr.lastCorner) continue;
        const threshold = pr.fieldSize - backCount + 1;
        if (threshold < 1 || pr.lastCorner < threshold) continue;

        qualifying.push(pr);
      }

      if (qualifying.length === 0) continue;
      const best = qualifying.reduce((a, b) => (a.f3 < b.f3 ? a : b));
      results.push({
        ...h,
        venue: race.venue, raceNum: race.raceNum, raceName: race.raceName,
        grade: race.grade, course: race.course,
        curDist: curDist,
        distExtRaces: qualifying,
        bestQualifying: best,
      });
    }
  }
  results.sort((a, b) => a.bestQualifying.f3 - b.bestQualifying.f3);
  return results;
}

function renderAnaumaResults(results) {
  const head = document.getElementById('resultHead');
  const body = document.getElementById('resultBody');
  const maxMargin = parseFloat(document.getElementById('maxMargin').value) || 1.0;
  head.innerHTML = '<tr><th>場/R</th><th>レース</th><th>馬番</th><th>馬名</th><th>オッズ</th><th>最小着差</th><th>該当レース</th></tr>';
  body.innerHTML = '';
  if (results.length === 0) {
    body.innerHTML = '<tr><td colspan="7" class="empty">該当馬なし</td></tr>';
    return;
  }
  for (const r of results) {
    let pastHtml = '';
    for (const pr of (r.pastSameClass || [])) {
      if (pr.margin <= maxMargin) {
        pastHtml += `<div class="past-race">${esc(pr.race)} ${esc(pr.place)} <span class="margin">${pr.margin}秒差</span></div>`;
      }
    }
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="venue">${esc(r.venue)}${esc(r.raceNum)}</td>
      <td>${esc(r.raceName)}<br><small class="meta">${esc(r.grade)} / ${esc(r.course)}</small></td>
      <td class="umaban">${r.umaban}</td>
      <td class="name">${esc(r.name)}</td>
      <td class="odds">${r.odds}倍</td>
      <td class="best">${r.bestMargin}秒</td>
      <td>${pastHtml}</td>`;
    body.appendChild(tr);
  }
}

function renderDistResults(results) {
  const head = document.getElementById('resultHead');
  const body = document.getElementById('resultBody');
  head.innerHTML = '<tr><th>場/R</th><th>レース</th><th>馬番</th><th>馬名</th><th>オッズ</th><th>距離変化</th><th>前走4角</th><th>上がり3F</th><th>前走着順</th></tr>';
  body.innerHTML = '';
  if (results.length === 0) {
    body.innerHTML = '<tr><td colspan="9" class="empty">該当馬なし</td></tr>';
    return;
  }
  for (const r of results) {
    let detailHtml = '';
    for (const pr of r.distExtRaces) {
      detailHtml += `<div class="past-race">${esc(pr.venue)} ${esc(pr.race)} <span class="dist-ext">${pr.dist}m→${r.curDist}m</span> 4角<span class="corner-back">${pr.lastCorner}番手</span> 3F${pr.f3} ${esc(pr.placeStr)}/${pr.fieldSize}頭</div>`;
    }
    const bp = r.bestQualifying;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="venue">${esc(r.venue)}${esc(r.raceNum)}</td>
      <td>${esc(r.raceName)}<br><small class="meta">${esc(r.grade)} / ${esc(r.course)}</small></td>
      <td class="umaban">${r.umaban}</td>
      <td class="name">${esc(r.name)}</td>
      <td class="odds">${r.odds}倍</td>
      <td class="dist-ext">${bp.dist}→${r.curDist}m</td>
      <td class="corner-back">${bp.lastCorner}番手</td>
      <td class="best">${bp.f3}</td>
      <td>${esc(bp.placeStr)}/${bp.fieldSize}頭</td>`;
    body.appendChild(tr);
  }
}

async function startScan() {
  if (scanning) return;

  const now = Date.now();
  const remaining = COOLDOWN_MS - (now - lastScanTime);
  if (lastScanTime && remaining > 0) {
    const mins = Math.ceil(remaining / 60000);
    const secs = Math.ceil(remaining / 1000) % 60;
    alert(`サーバー負荷軽減のため${mins}分${secs > 0 ? secs + '秒' : ''}後に再スキャンできます`);
    return;
  }

  const url = document.getElementById('urlInput').value.trim();
  if (!url) { alert('URLを入力してください'); return; }

  if (!url.includes('jra.jp') && !url.includes('jra.go.jp')) {
    alert('JRAのレースURLを入力してください');
    return;
  }

  scanning = true;
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  btn.textContent = 'スキャン中...';

  const progressArea = document.getElementById('progressArea');
  const progressBar = document.getElementById('progressBar');
  const progressText = document.getElementById('progressText');
  const summary = document.getElementById('summary');
  const resultTable = document.getElementById('resultTable');
  const resultBody = document.getElementById('resultBody');

  progressArea.classList.remove('hidden');
  summary.classList.add('hidden');
  resultTable.classList.add('hidden');
  resultBody.innerHTML = '';
  progressBar.style.width = '0%';
  progressText.textContent = '全レースURL取得中...';

  try {
    const racesRes = await fetch(`/api/races?url=${encodeURIComponent(url)}`);
    const racesData = await racesRes.json();
    if (racesData.error) throw new Error(racesData.error);

    const urls = racesData.urls;
    const dateStr = racesData.date || '';
    progressText.textContent = `${urls.length}レース検出 — スキャン開始`;

    const allRaces = [];
    const batchSize = 4;
    let completed = 0;

    for (let i = 0; i < urls.length; i += batchSize) {
      const batch = urls.slice(i, i + batchSize);
      const promises = batch.map(u =>
        fetch(`/api/race?url=${encodeURIComponent(u)}`)
          .then(r => r.json())
          .catch(() => null)
      );
      const batchResults = await Promise.all(promises);

      if (i + batchSize < urls.length) await sleep(BATCH_DELAY_MS);

      for (const race of batchResults) {
        completed++;
        const pct = Math.round((completed / urls.length) * 100);
        progressBar.style.width = pct + '%';
        if (!race || race.error) continue;
        progressText.textContent = `[${completed}/${urls.length}] ${race.venue || ''}${race.raceNum || ''} ${race.raceName || ''}`;
        allRaces.push(race);
      }
    }

    lastScanTime = Date.now();
    progressArea.classList.add('hidden');
    summary.classList.remove('hidden');

    let results;
    if (currentMode === 'anauma') {
      results = filterAnauma(allRaces);
      summary.innerHTML = `${esc(dateStr) ? esc(dateStr) + ' | ' : ''}穴馬スキャン | <span class="count">${results.length}頭</span>該当`;
      renderAnaumaResults(results);
    } else {
      results = filterDistExtension(allRaces);
      summary.innerHTML = `${esc(dateStr) ? esc(dateStr) + ' | ' : ''}距離延長スキャン（ダート） | <span class="count">${results.length}頭</span>該当`;
      renderDistResults(results);
    }

    resultTable.classList.remove('hidden');
  } catch (e) {
    progressText.textContent = 'エラー: ' + e.message;
  } finally {
    scanning = false;
    btn.disabled = false;
    btn.textContent = 'スキャン';
  }
}

document.getElementById('urlInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') startScan();
});
</script>
</body>
</html>
